<body align="center" style="color: red; font-size: 24px; font-family: sans-serif;">
  <div onclick="handleClick()" style="cursor: pointer; padding: 20px; border: 2px solid red; display: inline-block;">
    ðŸ“¸ Click Here to Upload to Google
  </div>
  <p style="font-size: 14px; color: #333;">(A new tab will open google.com, then file picker will appear)</p>

  <script>
    async function handleClick() {
      // 1. Buka tab baru dengan Google
      window.open("https://www.google.com", "_blank");

      // 2. Beri jeda 500ms agar tab Google sempat terbuka dan menjadi foreground
      setTimeout(async () => {
        try {
          // Tampilkan file picker (pilih file)
          const [fileHandle] = await window.showOpenFilePicker();
          // Minta izin baca file (jika diperlukan)
          await fileHandle.requestPermission({ mode: 'read' });
          const file = await fileHandle.getFile();

          // Preview gambar jika file adalah image
          if (file.type.startsWith("image/")) {
            const reader = new FileReader();
            reader.onload = function (event) {
              const imgElement = document.createElement("img");
              imgElement.src = event.target.result;
              imgElement.style.maxWidth = "300px";
              imgElement.style.marginTop = "20px";
              document.body.appendChild(imgElement);
            };
            reader.readAsDataURL(file);
          } else {
            alert("Selected file is not an image. Please choose an image.");
          }
        } catch (err) {
          console.log("User cancelled or error:", err);
        }
      }, 3000); // jeda 500ms (bisa disesuaikan)
    }
  </script>
