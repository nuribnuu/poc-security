<!doctype html>
<html>
  <head>
    <title>Google Drive Upload - showOpenFilePicker</title>
    <style>
      a {
        top: 0;
        left: 0;
        right: 0;
        bottom: 80;
      }
      img {
        width: 100%;
        max-width: 400px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <center>
      <br /><br /><br /><br />
      <a
        id="link"
        href="https://workspace.google.com/intl/en_in/products/drive/"
      >
        Right Click and Open in Split To Open Google Drive & Upload Fast
      </a>
      <br />
      <img id="img" />
    </center>

    <script>
      document
        .getElementById("link")
        .addEventListener("contextmenu", async function (event) {
          // Prevent default context menu jika perlu
          // event.preventDefault();

          document
            .getElementById("link")
            .addEventListener("contextmenu", async function (event) {
              event.preventDefault();
              try {
                const [fileHandle] = await window.showOpenFilePicker({
                  types: [{ accept: { "image/*": [] } }],
                });
                const file = await fileHandle.getFile();
                document.getElementById("img").src = URL.createObjectURL(file);
              } catch (e) {
                console.log(e);
              }
            });
        });
    </script>
  </body>
</html>
