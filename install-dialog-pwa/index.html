<!DOCTYPE html>
<html>
<head>
  <link rel="manifest" href="manifest.webmanifest">
  <script>
    navigator.serviceWorker.register('sw.js');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      showResult('✅ BeforeInstallPrompt fired');
    });
    let deferredPrompt;
    async function installApp() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
        if (outcome === 'accepted') location.href = 'https://microsoft.com';
      }
    }
    // Pancing dialog + navigasi
    document.addEventListener('click', () => {
      installApp();
      window.location.href = 'https://microsoft.com';
    });
    function showResult(t) { console.log(t); }
  </script>
</head>
<body><button>Click</button></body>
</html>
