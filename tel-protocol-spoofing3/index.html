<!doctype html>
<html>
  <head>

    <title>iOS Spoof - Teknik 3</title>
    <style>
      .btn {
        background: #007aff;
        color: white;
        padding: 20px;
        border-radius: 50px;
        text-decoration: none;
        display: block;
        text-align: center;
        font-family: sans-serif;
        font-weight: bold;
        margin-top: 50px;
      }
    </style>
  </head>
  <body>
    <a href="javascript:void(0)" onclick="runSpoof3()" class="btn"
      >📞 Verify with Apple</a
    >

    <script>
      function runSpoof3() {
        // Jalankan tel link
        window.location.href = "tel:+1234567890";

        // Buat HTML blob untuk redirect
        const targetUrl = "https://www.apple.com/contact/";
        const htmlContent = `<html><script>window.location.replace('${targetUrl}');<\/script></html>`;
        const blob = new Blob([htmlContent], { type: "text/html" });
        const blobUrl = URL.createObjectURL(blob);

        // Arahkan ke blob URL yang akan segera me-redirect ke Apple
        setTimeout(function () {
          window.location.href = blobUrl;
        }, 20);
      }
    </script>
  </body>
