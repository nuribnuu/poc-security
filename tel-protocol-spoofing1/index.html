<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spoofed Tel Link Demo</title>
    <style>
        /* Gaya umum untuk body agar link berada di tengah */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Styling link menjadi tombol besar */
        .spoofed-button {
            display: inline-block;
            background: #007aff;      /* warna biru khas Apple */
            color: white;
            font-size: 24px;
            font-weight: 600;
            padding: 16px 40px;
            border-radius: 50px;
            text-decoration: none;     /* hilangkan underline */
            text-align: center;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            border: none;
            letter-spacing: 0.5px;
            backdrop-filter: blur(2px);
        }

        /* Efek hover */
        .spoofed-button:hover {
            background: #005fc1;
            transform: scale(1.02);
            box-shadow: 0 12px 28px rgba(0,0,0,0.25);
        }

        /* Efek aktif (saat diklik) */
        .spoofed-button:active {
            transform: scale(0.98);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Opsional: tambahkan teks kecil di bawah tombol untuk konteks demo */
        .demo-note {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: #4a5568;
            background: rgba(255,255,255,0.7);
            padding: 8px 16px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <a onclick="setTimeout(function(){document.location='https://www.apple.com/contact/'}, 1)" 
           href="tel:+1234567890" 
           class="spoofed-button">
           📞 Contact Apple
        </a>
    </div>
</body>
</html>
